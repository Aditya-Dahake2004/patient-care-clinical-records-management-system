<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Encounter - CareRecords</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="../../common/css/styles.css" rel="stylesheet">
</head>
<body class="bg-light">

<aside class="sidebar">
    <div class="sidebar-brand text-primary fw-bold">CareRecords EHR</div>
    <ul class="sidebar-menu">
        <li class="menu-header">EHR Records</li>
        <li class="sidebar-item"><a href="../index.html"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a></li>
        <li class="sidebar-item"><a href="create-encounter.html" class="active"><i class="bi bi-file-earmark-plus"></i><span>Create Encounter</span></a></li>
        <li class="sidebar-item"><a href="medical-history.html"><i class="bi bi-folder2-open"></i><span>Medical History</span></a></li>
        <li class="sidebar-item"><a href="diagnosis-tracking.html"><i class="bi bi-activity"></i><span>Diagnosis Tracking</span></a></li>
        <li class="sidebar-item"><a href="clinical-notes.html"><i class="bi bi-file-text"></i><span>Clinical Notes</span></a></li>
        <li class="sidebar-item"><a href="vitals-summary.html"><i class="bi bi-heart-pulse"></i><span>Vitals Summary</span></a></li>
    </ul>
</aside>

<div class="main-content">
    <nav class="navbar navbar-expand-lg navbar-light bg-white border rounded-3 p-2 mb-3 shadow-sm">
        <div class="container-fluid">
            <button class="btn btn-sm btn-light sidebar-toggle-btn border d-lg-none me-2"><i class="bi bi-list"></i></button>
            <span class="navbar-brand fw-bold text-primary mb-0 fs-6">Record Clinical Encounter</span>
        </div>
    </nav>

    <div class="card metric-card p-4">
        <h5 class="fw-bold text-dark border-bottom pb-2 mb-3">New Encounter Document</h5>
        <form id="createEncounterForm">

            <div class="row g-3 mb-3 bg-light p-2 rounded border">
                <div class="col-12 col-md-4">
                    <label class="med-form-label small text-secondary fw-bold">Encounter Date</label>
                    <input type="date" class="form-control form-control-sm" id="enc-date" required>
                </div>
                <div class="col-12 col-md-4">
                    <label class="med-form-label small text-secondary fw-bold">Attending Physician</label>
                    <select class="form-select form-select-sm" id="enc-doctor" required>
                        <option value="Dr. Smith">Dr. Smith (General Practice)</option>
                        <option value="Dr. Patel">Dr. Patel (Cardiology)</option>
                    </select>
                </div>
                <div class="col-12 col-md-4">
                    <label class="med-form-label small text-secondary fw-bold">Encounter Type</label>
                    <select class="form-select form-select-sm" id="enc-type">
                        <option>Initial Visit</option>
                        <option>Follow-up</option>
                        <option>Telehealth</option>
                    </select>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-12 col-md-6">
                    <label class="med-form-label fw-bold" for="enc-patient">Select Patient <span class="text-danger">*</span></label>
                    <select id="enc-patient" class="form-select" required>
                    </select>
                </div>
                <div class="col-12 col-md-6">
                    <label class="med-form-label fw-bold" for="enc-diagnosis">Clinical Diagnosis (ICD-10) <span class="text-danger">*</span></label>
                    <input type="text" id="enc-diagnosis" class="form-control" placeholder="e.g. Hypertension (I10)" required>
                </div>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-12 col-md-4">
                    <label class="med-form-label fw-bold" for="enc-bp">Blood Pressure (BP) <span class="text-danger">*</span></label>
                    <input type="text" id="enc-bp" class="form-control" placeholder="120/80 mmHg" required>
                </div>
                <div class="col-12 col-md-4">
                    <label class="med-form-label fw-bold text-secondary">Heart Rate (bpm)</label>
                    <input type="number" class="form-control" placeholder="e.g. 72">
                </div>
                <div class="col-12 col-md-4">
                    <label class="med-form-label fw-bold text-secondary">Temperature (°C)</label>
                    <input type="number" class="form-control" placeholder="e.g. 37.0" step="0.1">
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-12">
                    <label class="med-form-label fw-bold" for="enc-notes">Clinical Encounter Notes <span class="text-danger">*</span></label>
                    <textarea id="enc-notes" rows="4" class="form-control" placeholder="Subjective, Objective, Assessment, Plan (SOAP)..." required></textarea>
                </div>
            </div>

            <div class="d-flex justify-content-end gap-2 border-top pt-3">
                <button type="reset" class="btn btn-sm btn-outline-secondary">Discard</button>
                <button type="submit" class="btn btn-sm btn-primary px-4"><i class="bi bi-floppy me-1"></i> Sign & Save Encounter</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../common/js/mock-data.js"></script>
<script src="../../common/js/main.js"></script>
<script src="../js/ehr-app.js"></script>
<script>document.getElementById('enc-date').valueAsDate = new Date();</script>
</body>
</html>
