<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Slots - CareRecords</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../common/css/styles.css" rel="stylesheet">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">CareRecords Basic</div>
        <ul class="sidebar-menu">
          
            
            <li class="menu-header">Appointment Scheduling</li>
            <li class="sidebar-item"><a href="../index.html"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a></li>
            <li class="sidebar-item"><a href="book-appointment.html"><i class="bi bi-calendar-plus"></i><span>Book Appointment</span></a></li>
            <li class="sidebar-item"><a href="list-appointments.html"><i class="bi bi-calendar-event"></i><span>Appointment List</span></a></li>
            <li class="sidebar-item"><a href="doctor-slots.html" class="active"><i class="bi bi-clock"></i><span>Doctor Slots</span></a></li>
        </ul>
    </aside>

    <!-- MAIN WRAPPER -->
    <div class="main-content">
        <!-- HEADER -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white border rounded-3 p-3 mb-4 shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-light sidebar-toggle-btn border d-lg-none me-2"><i class="bi bi-list"></i></button>
                <span class="navbar-brand fw-bold text-primary mb-0">Doctor Slots Availability</span>
            </div>
        </nav>

        <div class="card metric-card p-4">
            <h5 class="fw-bold text-dark mb-4">Doctor Slots Roster</h5>
            
            <div class="row mb-4">
                <div class="col-12 col-md-6">
                    <label class="med-form-label" for="slot-doctor">Select Physician</label>
                    <select id="slot-doctor" class="form-select" style="cursor: pointer;">
                        <option value="Dr. John Watson" selected>Dr. John Watson (General Medicine)</option>
                        <option value="Dr. Gregory House">Dr. Gregory House (Cardiology)</option>
                        <option value="Dr. Addison Montgomery">Dr. Addison Montgomery (Obstetrics)</option>
                        <option value="Dr. Meredith Grey">Dr. Meredith Grey (Orthopedics)</option>
                    </select>
                </div>
            </div>

            <div class="border-top pt-4">
                <h6 class="fw-bold text-secondary mb-3">Daily Hourly Schedule</h6>
                <div id="slots-list-body" class="border rounded">
                    <!-- Dynamically populated via appointment-app.js -->
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../common/js/mock-data.js"></script>
    <script src="../../common/js/main.js"></script>
    <script src="../js/appointment-app.js"></script>
</body>
</html>
