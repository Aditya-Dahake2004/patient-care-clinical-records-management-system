<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Details - CareRecords</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../common/css/styles.css" rel="stylesheet">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">CareRecords Basic</div>
        <ul class="sidebar-menu">
           
            
            <li class="menu-header">Appointment Scheduling</li>
            <li class="sidebar-item"><a href="../index.html"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a></li>
            <li class="sidebar-item"><a href="book-appointment.html"><i class="bi bi-calendar-plus"></i><span>Book Appointment</span></a></li>
            <li class="sidebar-item"><a href="list-appointments.html"><i class="bi bi-calendar-event"></i><span>Appointment List</span></a></li>
            <li class="sidebar-item"><a href="doctor-slots.html"><i class="bi bi-clock"></i><span>Doctor Slots</span></a></li>
        </ul>
    </aside>

    <!-- MAIN WRAPPER -->
    <div class="main-content">
        <!-- HEADER -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white border rounded-3 p-3 mb-4 shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-light sidebar-toggle-btn border d-lg-none me-2"><i class="bi bi-list"></i></button>
                <span class="navbar-brand fw-bold text-primary mb-0">Appointment Detail Summary</span>
            </div>
        </nav>

        <div class="card metric-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                <h5 class="fw-bold text-dark mb-0">Appointment Summary</h5>
                <div>
                    <button id="det-cancel-btn" class="btn btn-outline-danger btn-sm me-2"><i class="bi bi-x-circle"></i> Cancel Appointment</button>
                    <a id="det-reschedule-link" href="#" class="btn btn-outline-secondary btn-sm"><i class="bi bi-calendar2-range"></i> Reschedule</a>
                </div>
            </div>

            <div class="row g-3">
                <div class="col-12 col-md-4 border-end">
                    <span class="text-secondary small fw-bold text-uppercase">Visit ID</span>
                    <h5 class="fw-bold text-dark mt-1" id="det-id">--</h5>
                </div>
                <div class="col-12 col-md-4 border-end">
                    <span class="text-secondary small fw-bold text-uppercase">Patient Name</span>
                    <h5 class="fw-bold text-dark mt-1" id="det-patient">--</h5>
                </div>
                <div class="col-12 col-md-4">
                    <span class="text-secondary small fw-bold text-uppercase">Assigned Doctor</span>
                    <h5 class="fw-bold text-dark mt-1" id="det-doctor">--</h5>
                </div>
            </div>

            <div class="row g-3 mt-4 pt-3 border-top">
                <div class="col-12 col-md-4 border-end">
                    <span class="text-secondary small fw-bold text-uppercase">Scheduled Date</span>
                    <h5 class="fw-bold text-dark mt-1" id="det-date">--</h5>
                </div>
                <div class="col-12 col-md-4 border-end">
                    <span class="text-secondary small fw-bold text-uppercase">Scheduled Time Slot</span>
                    <h5 class="fw-bold text-dark mt-1" id="det-time">--</h5>
                </div>
                <div class="col-12 col-md-4">
                    <span class="text-secondary small fw-bold text-uppercase">Lifecycle Status</span>
                    <h5 class="fw-bold text-primary mt-1" id="det-status">--</h5>
                </div>
            </div>
            
            <div class="d-flex gap-2 border-top pt-4 mt-4 justify-content-end">
                <a href="list-appointments.html" class="btn btn-outline-secondary">Back to List</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../common/js/mock-data.js"></script>
    <script src="../../common/js/main.js"></script>
    <script src="../js/appointment-app.js"></script>
</body>
</html>
