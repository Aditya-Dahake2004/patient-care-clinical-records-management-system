<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment List - CareRecords</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="../../common/css/styles.css" rel="stylesheet">
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="sidebar-brand">CareRecords Basic</div>
        <ul class="sidebar-menu">

            
            <li class="menu-header">Appointment Scheduling</li>
            <li class="sidebar-item"><a href="../index.html"><i class="bi bi-grid-1x2"></i><span>Dashboard</span></a></li>
            <li class="sidebar-item"><a href="book-appointment.html"><i class="bi bi-calendar-plus"></i><span>Book Appointment</span></a></li>
            <li class="sidebar-item"><a href="list-appointments.html" class="active"><i class="bi bi-calendar-event"></i><span>Appointment List</span></a></li>
            <li class="sidebar-item"><a href="doctor-slots.html"><i class="bi bi-clock"></i><span>Doctor Slots</span></a></li>
        </ul>
    </aside>

    <!-- MAIN WRAPPER -->
    <div class="main-content">
        <!-- HEADER -->
        <nav class="navbar navbar-expand-lg navbar-light bg-white border rounded-3 p-3 mb-4 shadow-sm">
            <div class="container-fluid">
                <button class="btn btn-light sidebar-toggle-btn border d-lg-none me-2"><i class="bi bi-list"></i></button>
                <span class="navbar-brand fw-bold text-primary mb-0">Clinic Appointment Schedule</span>
            </div>
        </nav>

        <div class="card metric-card p-4">
            <h5 class="fw-bold text-dark mb-4">All Schedules</h5>
            <div class="table-responsive">
                <table class="table table-hover table-striped border">
                    <thead class="bg-light">
                        <tr>
                            <th>Visit ID</th>
                            <th>Patient Name</th>
                            <th>Doctor Assigned</th>
                            <th>Scheduled Date</th>
                            <th>Scheduled Time</th>
                            <th>Status Badge</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="appt-table-body">
                        <!-- Loaded dynamically via appointment-app.js -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../common/js/mock-data.js"></script>
    <script src="../../common/js/main.js"></script>
    <script src="../js/appointment-app.js"></script>
</body>
</html>
