<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Appointments - CareRecord</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Global CSS -->
    <link href="../../common/css/common.css" rel="stylesheet">
    <!-- Specific CSS -->
    <link href="../css/appointments.css" rel="stylesheet">
</head>
<body>
    <div id="wrapper">
        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading text-white">
                <i class="bi bi-heart-pulse-fill text-info me-2"></i>CareRecord
            </div>
            <div class="list-group list-group-flush flex-grow-1">
                <a href="patient-dashboard.html" class="list-group-item">
                    <i class="bi bi-grid-1x2-fill"></i> Dashboard
                </a>
                <a href="my-appointments.html" class="list-group-item active">
                    <i class="bi bi-calendar2-check"></i> My Appointments
                </a>
                <a href="my-prescriptions.html" class="list-group-item">
                    <i class="bi bi-prescription2"></i> My Prescriptions
                </a>
                <a href="my-medical-history.html" class="list-group-item">
                    <i class="bi bi-file-earmark-medical"></i> EMR History
                </a>
                <a href="my-bills.html" class="list-group-item">
                    <i class="bi bi-credit-card"></i> My Bills
                </a>
                <a href="patient-profile.html" class="list-group-item">
                    <i class="bi bi-person-bounding-box"></i> Profile
                </a>
                <a href="patient-settings.html" class="list-group-item">
                    <i class="bi bi-sliders"></i> Settings
                </a>
            </div>
            <div class="p-3 border-top border-secondary">
                <a href="#" id="sign-out-btn" class="list-group-item py-2 text-danger">
                    <i class="bi bi-box-arrow-left"></i> Sign Out
                </a>
            </div>
        </div>
        <!-- /#sidebar-wrapper -->

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <!-- Navbar -->
            <nav class="navbar navbar-expand-lg navbar-custom">
                <div class="container-fluid">
                    <button class="btn btn-primary btn-sm me-3" id="menu-toggle">
                        <i class="bi bi-justify"></i> Menu
                    </button>
                    
                    <span class="navbar-brand">Consultation Schedule</span>

                    <div class="ms-auto d-flex align-items-center">
                        <div class="dropdown">
                            <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" role="button" id="profileDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                                
                                <span class="d-none d-sm-inline text-dark fw-semibold" id="topNavPatientName">John Doe</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2" aria-labelledby="profileDropdown">
                                <li><a class="dropdown-item" href="patient-profile.html"><i class="bi bi-person me-2"></i> My Profile</a></li>
                                <li><a class="dropdown-item" href="patient-settings.html"><i class="bi bi-gear me-2"></i> Settings</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item text-danger" href="#" id="sign-out-btn-dropdown"><i class="bi bi-box-arrow-left me-2"></i> Sign Out</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Content Area -->
            <div class="container-fluid px-4 py-4">
                <div class="card clinic-card p-4">
                    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
                        <div class="d-flex flex-wrap gap-2 flex-grow-1">
                            <input type="text" id="searchDoctor" class="form-control" style="max-width: 320px;" placeholder="Search doctor by name...">
                            <select id="filterStatus" class="form-select" style="max-width: 170px;">
                                <option value="All">All Appointments</option>
                                <option value="BOOKED">Upcoming</option>
                                <option value="COMPLETED">Completed</option>
                                <option value="CANCELLED">Cancelled</option>
                            </select>
                        </div>
                        <div class="small text-muted">
                            <i class="bi bi-info-circle me-1"></i> Schedules booked via Reception Desk
                        </div>
                    </div>

                    <!-- Appointments Card Container -->
                    <div class="row g-4" id="appointmentsGrid">
                        <!-- Loaded dynamically via appointments.js -->
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <footer class="text-center mt-auto">
                <div class="container">
                    <p class="mb-0">© 2026 Patient Care & Clinical Records Management System. Secured Wellness Portal.</p>
                </div>
            </footer>
        </div>
        <!-- /#page-content-wrapper -->
    </div>
    <!-- /#wrapper -->

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared JS -->
    <script src="../../common/js/common.js"></script>
    <!-- Store Sync -->
    <script src="../../receptionist/js/store.js"></script>
    <!-- Appointments Specific JS -->
    <script src="../js/appointments.js"></script>
</body>
</html>
