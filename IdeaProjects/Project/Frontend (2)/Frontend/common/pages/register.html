<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Hub - CareRecord</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Global CSS -->
    <link href="../css/common.css" rel="stylesheet">
    <!-- Specific CSS -->
    <link href="../css/register.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex align-items-center justify-content-center py-5" style="min-height: 100vh; background-color: var(--bg-light);">
        <div class="card border-0 clinic-card register-card p-4 mx-3">
            <div class="text-center mb-4">
                <a href="home.html" class="text-decoration-none d-inline-block mb-2">
                    <h3 class="brand-title"><i class="bi bi-heart-pulse-fill text-info me-1"></i>CareRecord</h3>
                </a>
                <h5 class="fw-bold text-dark">Create Hospital Member Credentials</h5>
                <p class="text-secondary small">Gain authorization codes to access local EMR charts.</p>
            </div>

            <form id="registerForm">
                <div class="row g-3">
                    <div class="col-md-6">
                        <label for="regName" class="form-label small fw-semibold text-dark">Full Member Name</label>
                        <input type="text" class="form-control" id="regName" required placeholder="e.g. Dr. Arthur Dent">
                    </div>
                    <div class="col-md-6">
                        <label for="regEmail" class="form-label small fw-semibold text-dark">Corporate Email ID</label>
                        <input type="email" class="form-control" id="regEmail" required placeholder="e.g. arthur@carerecord.med.org">
                    </div>
                    <div class="col-md-6">
                        <label for="regPass" class="form-label small fw-semibold text-dark">Portal Password</label>
                        <input type="password" class="form-control" id="regPass" required placeholder="••••••••">
                    </div>
                    <div class="col-md-6">
                        <label for="regConfirm" class="form-label small fw-semibold text-dark">Confirm Secret Password</label>
                        <input type="password" class="form-control" id="regConfirm" required placeholder="••••••••">
                    </div>
                    <div class="col-md-6">
                        <label for="regPhone" class="form-label small fw-semibold text-dark">Contact Number</label>
                        <input type="tel" class="form-control" id="regPhone" required placeholder="+1 555-0100">
                    </div>
                    <div class="col-md-6">
                        <label for="regRole" class="form-label small fw-semibold text-dark">Clinic Role Classification</label>
                        <select class="form-select" id="regRole" required>
                            <option value="" disabled selected>Select Role Domain...</option>
                            <option value="Admin">Admin Staff</option>
                            <option value="Receptionist">Outpatient Receptionist</option>
                            <option value="Doctor">Medical Practitioner (MD)</option>
                            <option value="Pharmacist">Pharmacy Dispensary Officer</option>
                            <option value="Billing Officer">Biller & Insurance Officer</option>
                            <option value="Patient">Outpatient / Patient Portal</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4 mt-3">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="termsCheck" required>
                        <label class="form-check-label small text-muted" for="termsCheck">I certify information is legally correct under medical confidentiality laws.</label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold mb-3">
                    <i class="bi bi-person-check-fill me-2"></i>Register New Account
                </button>
            </form>

            <div class="text-center">
                <span class="small text-muted">Already registered?</span>
                <a href="login.html" class="small text-decoration-none fw-semibold ms-1">Sign In instead</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared JS -->
    <script src="../js/common.js"></script>
    <!-- Register Specific JS -->
    <script src="../js/register.js"></script>
</body>
</html>
