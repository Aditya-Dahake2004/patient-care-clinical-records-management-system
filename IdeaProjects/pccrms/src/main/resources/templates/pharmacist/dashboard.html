<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <!-- Pharmacist Dashboard Page -->
    <title>Pharmacist Dashboard</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar-hospital">
    <div class="brand">Patient Care <span>& Clinical Records</span></div>
    <div class="nav-right">
    <span class="nav-user"
          th:text="${pharmacist.fullName}">Pharmacist</span>
        <form method="post" action="/logout" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </div>
</nav>

<div class="dashboard-wrapper">

    <div class="sidebar">
        <div class="sidebar-title">Menu</div>
        <a href="/pharmacist/dashboard"
           class="nav-item active">🏠 Dashboard</a>
        <a href="/pharmacist/prescriptions"
           class="nav-item">💊 All Prescriptions</a>
        <a href="/pharmacist/prescriptions?status=PENDING"
           class="nav-item">⏳ Pending</a>
        <a href="/pharmacist/drug-interactions"
           class="nav-item">⚠️ Drug Interactions</a>
    </div>

    <div class="main-content">

        <div class="page-header">
            <h2>Welcome,
                <span th:text="${pharmacist.fullName}"></span>
            </h2>
            <p>Counter:
                <span th:text="${pharmacist.assignedCounter}"></span>
            </p>
        </div>

        <div th:if="${success}" class="alert alert-success"
             th:text="${success}"></div>

        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Pending Prescriptions</div>
                <div class="stat-value"
                     th:text="${pendingCount}">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Prescriptions</div>
                <div class="stat-value"
                     th:text="${totalPrescriptions}">0</div>
            </div>
        </div>

        <!-- Pending Prescriptions -->
        <div class="card-hospital">
            <div style="display:flex;
                  justify-content:space-between;
                  align-items:center;
                  margin-bottom:1rem;">
                <h3 style="margin:0; border:none; padding:0;">
                    Pending Prescriptions
                </h3>
                <a href="/pharmacist/prescriptions?status=PENDING"
                   class="btn-secondary-hospital">View All</a>
            </div>

            <table class="table-hospital">
                <thead>
                <tr>
                    <th>Patient</th>
                    <th>MRN</th>
                    <th>Medication</th>
                    <th>Dosage</th>
                    <th>Frequency</th>
                    <th>Action</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${pendingList}">
                    <td th:text="${p.patient.fullName}"></td>
                    <td th:text="${p.patient.mrn}"></td>
                    <td th:text="${p.medicationName}"></td>
                    <td th:text="${p.dosage}"></td>
                    <td th:text="${p.frequency}"></td>
                    <td>
                        <form th:action="@{/pharmacist/prescriptions/
                    dispense/{id}(id=${p.prescriptionId})}"
                              method="post"
                              style="display:inline;">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <button type="submit"
                                    class="btn-primary-hospital"
                                    style="width:auto;
                               padding:0.4rem 0.9rem;
                               margin:0;">
                                Dispense
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(pendingList)}">
                    <td colspan="6"
                        style="text-align:center;
                       color:var(--gray-400);">
                        No pending prescriptions.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

</body>
</html>
