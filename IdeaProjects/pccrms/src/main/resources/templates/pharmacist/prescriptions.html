<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <!-- Prescriptions Management Page -->
    <title>Prescriptions — Pharmacist</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>

<nav class="navbar-hospital">
    <div class="brand">Patient Care <span>& Clinical Records</span></div>
    <div class="nav-right">
        <span class="nav-user">Pharmacist</span>
        <form method="post" action="/logout" style="display:inline;">
            <input type="hidden" th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <button type="submit" class="btn-logout">Logout</button>
        </form>
    </div>
</nav>

<div class="dashboard-wrapper">
    <div class="sidebar">
        <div class="sidebar-title">Menu</div>
        <a href="/pharmacist/dashboard"
           class="nav-item">🏠 Dashboard</a>
        <a href="/pharmacist/prescriptions"
           class="nav-item active">💊 All Prescriptions</a>
        <a href="/pharmacist/prescriptions?status=PENDING"
           class="nav-item">⏳ Pending</a>
        <a href="/pharmacist/drug-interactions"
           class="nav-item">⚠️ Drug Interactions</a>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h2>Prescriptions</h2>
            <p>Manage and dispense medications</p>
        </div>

        <div th:if="${success}" class="alert alert-success"
             th:text="${success}"></div>

        <!-- Filter Tabs -->
        <div style="display:flex; gap:0.5rem;
                margin-bottom:1.25rem;">
            <a href="/pharmacist/prescriptions"
               style="padding:0.45rem 1rem;
                border-radius:var(--radius-sm);
                font-size:0.85rem; font-weight:500;
                text-decoration:none;"
               th:classappend="${selectedStatus == null}
                         ? 'btn-primary-hospital'
                         : 'btn-secondary-hospital'">
                All
            </a>
            <a href="/pharmacist/prescriptions?status=PENDING"
               style="padding:0.45rem 1rem;
                border-radius:var(--radius-sm);
                font-size:0.85rem; font-weight:500;
                text-decoration:none;"
               th:classappend="${selectedStatus == 'PENDING'}
                         ? 'btn-primary-hospital'
                         : 'btn-secondary-hospital'">
                Pending
            </a>
            <a href="/pharmacist/prescriptions?status=DISPENSED"
               style="padding:0.45rem 1rem;
                border-radius:var(--radius-sm);
                font-size:0.85rem; font-weight:500;
                text-decoration:none;"
               th:classappend="${selectedStatus == 'DISPENSED'}
                         ? 'btn-primary-hospital'
                         : 'btn-secondary-hospital'">
                Dispensed
            </a>
            <a href="/pharmacist/prescriptions?status=CANCELLED"
               style="padding:0.45rem 1rem;
                border-radius:var(--radius-sm);
                font-size:0.85rem; font-weight:500;
                text-decoration:none;"
               th:classappend="${selectedStatus == 'CANCELLED'}
                         ? 'btn-primary-hospital'
                         : 'btn-secondary-hospital'">
                Cancelled
            </a>
        </div>

        <div class="card-hospital">
            <table class="table-hospital">
                <thead>
                <tr>
                    <th>Patient</th>
                    <th>MRN</th>
                    <th>Doctor</th>
                    <th>Medication</th>
                    <th>Dosage</th>
                    <th>Frequency</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${prescriptions}">
                    <td th:text="${p.patient.fullName}"></td>
                    <td th:text="${p.patient.mrn}"></td>
                    <td th:text="${p.doctor.fullName}"></td>
                    <td th:text="${p.medicationName}"></td>
                    <td th:text="${p.dosage}"></td>
                    <td th:text="${p.frequency}"></td>
                    <td>
              <span th:class="${'badge badge-' +
                    p.dispenseStatus.name().toLowerCase()}"
                    th:text="${p.dispenseStatus}"></span>
                    </td>
                    <td style="display:flex;
                       gap:0.4rem;
                       flex-wrap:wrap;">

                        <a th:href="@{/pharmacist/prescriptions/{id}
                 (id=${p.prescriptionId})}"
                           class="btn-secondary-hospital">
                            View
                        </a>

                        <!-- Dispense -->
                        <form th:action="@{/pharmacist/prescriptions/
                    dispense/{id}(id=${p.prescriptionId})}"
                              method="post"
                              style="display:inline;"
                              th:if="${p.dispenseStatus.name()
                            == 'PENDING'}">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <button type="submit"
                                    class="btn-primary-hospital"
                                    style="width:auto;
                               padding:0.4rem 0.9rem;
                               margin:0;">
                                Dispense
                            </button>
                        </form>

                        <!-- Cancel -->
                        <form th:action="@{/pharmacist/prescriptions/
                    cancel/{id}(id=${p.prescriptionId})}"
                              method="post"
                              style="display:inline;"
                              th:if="${p.dispenseStatus.name()
                            == 'PENDING'}">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}"/>
                            <button type="submit"
                                    class="btn-danger-hospital"
                                    onclick="return confirm(
                          'Cancel this prescription?')">
                                Cancel
                            </button>
                        </form>

                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(prescriptions)}">
                    <td colspan="8"
                        style="text-align:center;
                       color:var(--gray-400);">
                        No prescriptions found.
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

</body>
</html>
