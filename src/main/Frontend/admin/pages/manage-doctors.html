<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Doctors - CareRecord</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../common/css/common.css" rel="stylesheet">
    <link href="../css/manage-doctors.css" rel="stylesheet">
</head>
<body>
    <div id="wrapper">
        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading text-white">
                <i class="bi bi-heart-pulse-fill text-info me-2"></i>CareRecord
            </div>
            <div class="list-group list-group-flush flex-grow-1">
                <a href="admin-dashboard.html" class="list-group-item">
                    <i class="bi bi-grid-1x2-fill"></i> Dashboard
                </a>
                <a href="manage-doctors.html" class="list-group-item active">
                    <i class="bi bi-person-fill-add"></i> Manage Doctors
                </a>
                <a href="reports.html" class="list-group-item">
                    <i class="bi bi-file-earmark-bar-graph"></i> Reports
                </a>
            </div>
            <div class="p-3 border-top border-secondary">
                <a href="#" id="sign-out-btn" class="list-group-item py-2 text-danger">
                    <i class="bi bi-box-arrow-left"></i> Sign Out
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-custom">
                <div class="container-fluid">
                    <button class="btn btn-primary btn-sm me-3" id="menu-toggle">
                        <i class="bi bi-justify"></i> Menu
                    </button>
                    <span class="navbar-brand">Physician Resource Office</span>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4">
                <div class="card clinic-card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
                        <h4 class="fw-bold mb-0 text-primary"><i class="bi bi-person-badge-fill me-2"></i>Active Practitioners</h4>
                        <button class="btn btn-primary btn-sm" id="btnAddNewDoc" data-bs-toggle="modal" data-bs-target="#addDoctorModal">
                            <i class="bi bi-plus-lg me-1"></i> Register Doctor
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-custom align-middle">
                            <thead>
                                <tr>
                                    <th>Doctor Name</th>
                                    <th>Specialization Department</th>
                                    <th>Clinician Email ID</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody id="doctorsTableBody">
                                <!-- Loaded dynamically via manage-doctors.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Add Doctor Modal -->
            <div class="modal fade" id="addDoctorModal" tabindex="-1" aria-labelledby="addDoctorModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-0 shadow">
                        <div class="modal-header bg-light">
                            <h5 class="modal-title fw-bold" id="addDoctorModalLabel">Register New Medical Practitioner</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                        </div>
                        <div class="modal-body p-4">
                            <form id="addDoctorForm">
                                <div class="mb-3">
                                    <label for="docName" class="form-label small fw-semibold text-dark">Practitioner Name</label>
                                    <input type="text" class="form-control" id="docName" placeholder="e.g. Dr. Sarah Connor" required>
                                </div>
                                <div class="mb-3">
                                    <label for="docDept" class="form-label small fw-semibold text-dark">Clinical Specialty</label>
                                    <select class="form-select" id="docDept" required>
                                        <option value="" disabled selected>Select specialty...</option>
                                        <option value="Cardiology">Cardiology</option>
                                        <option value="Neurology">Neurology</option>
                                        <option value="Pediatrics">Pediatrics</option>
                                        <option value="General Medicine">General Medicine</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label for="docEmail" class="form-label small fw-semibold text-dark">Professional Email ID</label>
                                    <input type="email" class="form-control" id="docEmail" placeholder="e.g. sarah.connor@careclinic.org" required>
                                </div>
                                <button type="submit" class="btn btn-primary w-100 mt-2">Save Doctor Credentials</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <footer class="text-center mt-auto">
                <div class="container">
                    <p class="mb-0">© 2026 Patient Care & Clinical Records Management System.</p>
                </div>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../receptionist/js/store.js"></script>
    <script src="../js/manage-doctors.js"></script>
</body>
</html>
