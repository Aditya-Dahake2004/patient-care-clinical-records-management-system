<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dispense Medication - CareRecord</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../common/css/common.css" rel="stylesheet">
    <link href="../css/dispense-medication.css" rel="stylesheet">
</head>
<body>
    <div id="wrapper">
        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading text-white">
                <i class="bi bi-heart-pulse-fill text-info me-2"></i>CareRecord
            </div>
            <div class="list-group list-group-flush flex-grow-1">
                <a href="pharmacist-dashboard.html" class="list-group-item">
                    <i class="bi bi-grid-1x2-fill"></i> Dashboard
                </a>
                <a href="dispense-medication.html" class="list-group-item active">
                    <i class="bi bi-capsule"></i> Dispense Desk
                </a>
                <a href="medicine-inventory.html" class="list-group-item">
                    <i class="bi bi-list-stars"></i> Medicine Inventory
                </a>
            </div>
            <div class="p-3 border-top border-secondary">
                <a href="#" id="sign-out-btn" class="list-group-item py-2 text-danger">
                    <i class="bi bi-box-arrow-left"></i> Sign Out
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-custom">
                <div class="container-fluid">
                    <button class="btn btn-primary btn-sm me-3" id="menu-toggle">
                        <i class="bi bi-justify"></i> Menu
                    </button>
                    <span class="navbar-brand">Dispensing Desk</span>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4">
                <div class="card clinic-card p-4" style="max-width: 800px; margin: 0 auto;">
                    <h4 class="fw-bold text-primary mb-4"><i class="bi bi-check2-square me-2"></i>Fulfill Prescription Order</h4>
                    
                    <div class="mb-3">
                        <label for="selectPrescription" class="form-label small fw-semibold text-dark">Active Prescriptions Queue</label>
                        <select class="form-select" id="selectPrescription" required>
                            <option value="" disabled selected>Select active order...</option>
                            <!-- Loaded dynamically -->
                        </select>
                    </div>

                    <div id="dispenseSummaryCard" class="card bg-light p-4 border-0 rounded mb-4 d-none">
                        <h6 class="fw-bold text-dark mb-3"><i class="bi bi-file-earmark-text text-primary me-2"></i>Order Specification</h6>
                        <div class="row g-3 small mb-3">
                            <div class="col-6">
                                <span class="text-muted d-block">Patient Name:</span>
                                <strong class="text-dark fs-6" id="lblPatient">Lavanya Sri</strong>
                            </div>
                            <div class="col-6 text-end">
                                <span class="text-muted d-block">Prescribing Clinician:</span>
                                <strong class="text-dark fs-6" id="lblDoctor">Dr. Robert Chen</strong>
                            </div>
                        </div>
                        <hr>
                        <h6 class="fw-bold text-dark mb-2">Itemized Medicines</h6>
                        <div id="medicinesContainer">
                            <!-- Populated dynamically -->
                        </div>
                    </div>

                    <button id="btnDispense" class="btn btn-success w-100 py-2 d-none"><i class="bi bi-capsule me-1"></i> Fulfill & Dispense Prescription</button>
                </div>
            </div>

            <footer class="text-center mt-auto">
                <div class="container">
                    <p class="mb-0">© 2026 Patient Care & Clinical Records Management System.</p>
                </div>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../receptionist/js/store.js"></script>
    <script src="../js/dispense-medication.js"></script>
</body>
</html>
