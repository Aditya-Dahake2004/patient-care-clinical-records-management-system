<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medicine Inventory - CareRecord</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../common/css/common.css" rel="stylesheet">
    <link href="../css/medicine-inventory.css" rel="stylesheet">
</head>
<body>
    <div id="wrapper">
        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading text-white">
                <i class="bi bi-heart-pulse-fill text-info me-2"></i>CareRecord
            </div>
            <div class="list-group list-group-flush flex-grow-1">
                <a href="pharmacist-dashboard.html" class="list-group-item">
                    <i class="bi bi-grid-1x2-fill"></i> Dashboard
                </a>
                <a href="dispense-medication.html" class="list-group-item">
                    <i class="bi bi-capsule"></i> Dispense Desk
                </a>
                <a href="medicine-inventory.html" class="list-group-item active">
                    <i class="bi bi-list-stars"></i> Medicine Inventory
                </a>
            </div>
            <div class="p-3 border-top border-secondary">
                <a href="#" id="sign-out-btn" class="list-group-item py-2 text-danger">
                    <i class="bi bi-box-arrow-left"></i> Sign Out
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-custom">
                <div class="container-fluid">
                    <button class="btn btn-primary btn-sm me-3" id="menu-toggle">
                        <i class="bi bi-justify"></i> Menu
                    </button>
                    <span class="navbar-brand">Pharmacy Vault Stockroom</span>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4">
                <div class="card clinic-card p-4">
                    <h4 class="fw-bold text-primary mb-4"><i class="bi bi-shield-lock me-2"></i>Outpatient Pharmacy Catalog</h4>
                    <div class="table-responsive">
                        <table class="table table-custom align-middle">
                            <thead>
                                <tr>
                                    <th>Medicine Name</th>
                                    <th>Strength Class</th>
                                    <th>Stock Count</th>
                                    <th>Category Domain</th>
                                    <th>Status Warning</th>
                                    <th>Restock Action</th>
                                </tr>
                            </thead>
                            <tbody id="inventoryTableBody">
                                <!-- Loaded dynamically via medicine-inventory.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <footer class="text-center mt-auto">
                <div class="container">
                    <p class="mb-0">© 2026 Patient Care & Clinical Records Management System.</p>
                </div>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../receptionist/js/store.js"></script>
    <script src="../js/medicine-inventory.js"></script>
</body>
</html>
