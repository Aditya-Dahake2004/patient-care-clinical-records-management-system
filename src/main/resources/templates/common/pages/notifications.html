<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Notifications - CareRecord</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Global CSS -->
    <link href="../css/common.css" rel="stylesheet">
    <!-- Specific CSS -->
    <link href="../css/notifications.css" rel="stylesheet">
</head>
<body>
    <!-- Top Nav -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold text-primary" href="home.html">
                <i class="bi bi-heart-pulse-fill text-info me-2"></i>CareRecord
            </a>
            <div class="collapse navbar-collapse" id="publicNavbar">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                    <li class="nav-item"><a class="nav-link text-secondary" href="home.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link text-secondary" href="about.html">About Us</a></li>
                    <li class="nav-item"><a class="nav-link text-secondary" href="contact.html">Contact</a></li>
                </ul>
                <div class="d-flex gap-2">
                    <a href="login.html" class="btn btn-outline-primary btn-sm px-3 fw-semibold">Sign In</a>
                    <a href="register.html" class="btn btn-primary btn-sm px-3 fw-semibold">Sign Up</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Content Area -->
    <section class="py-5">
        <div class="container">
            <div class="card clinic-card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0 text-primary"><i class="bi bi-bell-fill me-2"></i>Notifications Board</h4>
                    <button class="btn btn-outline-secondary btn-sm" id="clearAllNotifications">
                        <i class="bi bi-trash3 me-1"></i> Clear All
                    </button>
                </div>
                <hr class="text-muted mb-4">

                <div class="list-group gap-3" id="notificationsList">
                    <!-- Loaded dynamically via notifications.js -->
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-secondary py-5">
        <div class="container text-center">
            <p class="small text-secondary-50">© 2026 Patient Care & Clinical Records Management System. Certified Healthcare Station.</p>
        </div>
    </footer>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared JS -->
    <script src="../js/common.js"></script>
    <!-- Notifications Specific JS -->
    <script src="../js/notifications.js"></script>
</body>
</html>
