<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication Center - CareRecord</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Global CSS -->
    <link href="../css/common.css" rel="stylesheet">
    <!-- Specific CSS -->
    <link href="../css/login.css" rel="stylesheet">
</head>
<body>
    <div class="auth-wrapper">
        <div class="card border-0 clinic-card auth-card p-4">
            <div class="text-center mb-4">
                <a href="home.html" class="text-decoration-none d-inline-block mb-2">
                    <h3 class="brand-title"><i class="bi bi-heart-pulse-fill text-info me-1"></i>CareRecord</h3>
                </a>
                <h5 class="fw-bold text-dark">Clinician & Patient Access Station</h5>
                <p class="text-secondary small">Authenticate session keys to access hospital databases.</p>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label for="loginEmail" class="form-label small fw-semibold text-dark">Session Email ID</label>
                    <input type="email" class="form-control" id="loginEmail" placeholder="e.g. john@carerecord.org" required>
                </div>
                <div class="mb-3">
                    <div class="d-flex justify-content-between mb-1">
                        <label for="loginPass" class="form-label small fw-semibold text-dark mb-0">Secret Password</label>
                        <a href="forgot-password.html" class="small text-decoration-none">Forgot Password?</a>
                    </div>
                    <input type="password" class="form-control" id="loginPass" required placeholder="••••••••">
                </div>
                <div class="mb-3">
                    <label for="loginRole" class="form-label small fw-semibold text-dark">User Authorization Role</label>
                    <select class="form-select" id="loginRole" required>
                        <option value="" disabled selected>Choose Authorization Domain...</option>
                        <option value="Admin">Admin</option>
                        <option value="Receptionist">Receptionist</option>
                        <option value="Doctor">Doctor</option>
                        <option value="Pharmacist">Pharmacist</option>
                        <option value="Billing Officer">Billing Officer</option>
                        <option value="Patient">Patient (John Doe)</option>
                    </select>
                </div>
                <div class="mb-4 d-flex justify-content-between align-items-center">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label small text-muted" for="rememberMe">Remember Session</label>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold mb-3">
                    <i class="bi bi-shield-check me-2"></i>Authenticate Session
                </button>
            </form>

            <div class="text-center">
                <span class="small text-muted">New healthcare member?</span>
                <a href="register.html" class="small text-decoration-none fw-semibold ms-1">Register Portal Account</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared JS -->
    <script src="../js/common.js"></script>
    <!-- Login Specific JS -->
    <script src="../js/login.js"></script>
</body>
</html>
