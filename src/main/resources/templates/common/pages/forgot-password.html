<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CareRecord</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Global CSS -->
    <link href="../css/common.css" rel="stylesheet">
    <!-- Specific CSS -->
    <link href="../css/forgot.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: var(--bg-light);">
        <div class="card border-0 clinic-card forgot-card p-4 mx-3">
            <div class="text-center mb-4">
                <a href="home.html" class="text-decoration-none d-inline-block mb-2">
                    <h3 class="brand-title"><i class="bi bi-heart-pulse-fill text-info me-1"></i>CareRecord</h3>
                </a>
                <h5 class="fw-bold text-dark">Password Recovery Desk</h5>
                <p class="text-secondary small">Provide your registered email to request recovery dispatchers.</p>
            </div>

            <form id="forgotForm">
                <div class="mb-4">
                    <label for="forgotEmail" class="form-label small fw-semibold text-dark">Your Account Email</label>
                    <input type="email" class="form-control" id="forgotEmail" placeholder="e.g. nurse@carerecord.med.org" required>
                </div>
                
                <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold mb-3">
                    <i class="bi bi-envelope-open me-2"></i>Send Reset Link
                </button>
            </form>

            <div class="text-center">
                <a href="login.html" class="small text-decoration-none fw-semibold"><i class="bi bi-arrow-left me-1"></i>Back to Sign In</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Shared JS -->
    <script src="../js/common.js"></script>
    <!-- Forgot Specific JS -->
    <script src="../js/forgot.js"></script>
</body>
</html>
