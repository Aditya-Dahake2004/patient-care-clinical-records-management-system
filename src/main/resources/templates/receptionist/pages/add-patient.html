<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Patient - CareRecord</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../common/css/common.css" rel="stylesheet">
    <link href="../css/add-patient.css" rel="stylesheet">
</head>
<body>
    <div id="wrapper">
        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading text-white">
                <i class="bi bi-heart-pulse-fill text-info me-2"></i>CareRecord
            </div>
            <div class="list-group list-group-flush flex-grow-1">
                <a href="receptionist-dashboard.html" class="list-group-item">
                    <i class="bi bi-grid-1x2-fill"></i> Dashboard
                </a>
                <a href="add-patient.html" class="list-group-item active">
                    <i class="bi bi-person-fill-add"></i> Add Patient
                </a>
                <a href="appointment-list.html" class="list-group-item">
                    <i class="bi bi-calendar-event"></i> Appointment List
                </a>
            </div>
            <div class="p-3 border-top border-secondary">
                <a href="#" id="sign-out-btn" class="list-group-item py-2 text-danger">
                    <i class="bi bi-box-arrow-left"></i> Sign Out
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-custom">
                <div class="container-fluid">
                    <button class="btn btn-primary btn-sm me-3" id="menu-toggle">
                        <i class="bi bi-justify"></i> Menu
                    </button>
                    <span class="navbar-brand">Patient Intake Registry</span>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4">
                <div class="card clinic-card p-4" style="max-width: 800px; margin: 0 auto;">
                    <h4 class="fw-bold text-primary mb-4"><i class="bi bi-person-bounding-box me-2"></i>New Patient Admission Form</h4>
                    <form id="addPatientForm">
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <label for="patName" class="form-label small fw-semibold text-dark">Patient Name</label>
                                <input type="text" class="form-control" id="patName" required placeholder="e.g. John Doe">
                            </div>
                            <div class="col-md-6">
                                <label for="patDob" class="form-label small fw-semibold text-dark">Date of Birth</label>
                                <input type="date" class="form-control" id="patDob" required>
                            </div>
                            <div class="col-md-6">
                                <label for="patGender" class="form-label small fw-semibold text-dark">Gender Identity</label>
                                <select class="form-select" id="patGender" required>
                                    <option value="" disabled selected>Select gender...</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="patPhone" class="form-label small fw-semibold text-dark">Primary Phone</label>
                                <input type="tel" class="form-control" id="patPhone" required placeholder="+1 555-0192">
                            </div>
                            <div class="col-12">
                                <label for="patAddress" class="form-label small fw-semibold text-dark">Residential Address</label>
                                <input type="text" class="form-control" id="patAddress" required placeholder="e.g. 742 Evergreen Terrace, Springfield">
                            </div>
                        </div>

                        <h5 class="fw-bold text-danger mt-4 mb-3"><i class="bi bi-telephone-outbound me-2"></i>Emergency Contact</h5>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6">
                                <label for="patContactName" class="form-label small fw-semibold text-dark">Contact Person Name</label>
                                <input type="text" class="form-control" id="patContactName" required placeholder="e.g. Jane Doe">
                            </div>
                            <div class="col-md-6">
                                <label for="patContactPhone" class="form-label small fw-semibold text-dark">Contact Person Phone</label>
                                <input type="tel" class="form-control" id="patContactPhone" required placeholder="+1 555-0193">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2"><i class="bi bi-save me-1"></i> Register New Profile</button>
                    </form>
                </div>
            </div>

            <footer class="text-center mt-auto">
                <div class="container">
                    <p class="mb-0">© 2026 Patient Care & Clinical Records Management System.</p>
                </div>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/store.js"></script>
    <script src="../js/add-patient.js"></script>
</body>
</html>
