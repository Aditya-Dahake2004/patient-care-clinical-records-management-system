<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment List - CareRecord</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="../../common/css/common.css" rel="stylesheet">
    <link href="../css/appointment-list.css" rel="stylesheet">
</head>
<body>
    <div id="wrapper">
        <!-- Sidebar -->
        <div id="sidebar-wrapper">
            <div class="sidebar-heading text-white">
                <i class="bi bi-heart-pulse-fill text-info me-2"></i>CareRecord
            </div>
            <div class="list-group list-group-flush flex-grow-1">
                <a href="receptionist-dashboard.html" class="list-group-item">
                    <i class="bi bi-grid-1x2-fill"></i> Dashboard
                </a>
                <a href="add-patient.html" class="list-group-item">
                    <i class="bi bi-person-fill-add"></i> Add Patient
                </a>
                <a href="appointment-list.html" class="list-group-item active">
                    <i class="bi bi-calendar-event"></i> Appointment List
                </a>
            </div>
            <div class="p-3 border-top border-secondary">
                <a href="#" id="sign-out-btn" class="list-group-item py-2 text-danger">
                    <i class="bi bi-box-arrow-left"></i> Sign Out
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-custom">
                <div class="container-fluid">
                    <button class="btn btn-primary btn-sm me-3" id="menu-toggle">
                        <i class="bi bi-justify"></i> Menu
                    </button>
                    <span class="navbar-brand">Consultations Ledger</span>
                </div>
            </nav>

            <div class="container-fluid px-4 py-4">
                <div class="card clinic-card p-4">
                    <div class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3">
                        <div class="d-flex flex-wrap gap-2 flex-grow-1">
                            <input type="text" id="searchAppt" class="form-control" style="max-width: 320px;" placeholder="Search by patient name...">
                            <select id="filterStatus" class="form-select" style="max-width: 170px;">
                                <option value="All">All Appointments</option>
                                <option value="BOOKED">Booked</option>
                                <option value="COMPLETED">Completed</option>
                                <option value="CANCELLED">Cancelled</option>
                            </select>
                        </div>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-custom align-middle">
                            <thead>
                                <tr>
                                    <th>Patient Name</th>
                                    <th>Physician MD</th>
                                    <th>Department</th>
                                    <th>Date</th>
                                    <th>Time Slot</th>
                                    <th>Status</th>
                                </tr>
                            </thead>
                            <tbody id="apptsTableBody">
                                <!-- Loaded dynamically via appointment-list.js -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <footer class="text-center mt-auto">
                <div class="container">
                    <p class="mb-0">© 2026 Patient Care & Clinical Records Management System.</p>
                </div>
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/store.js"></script>
    <script src="../js/appointment-list.js"></script>
</body>
</html>
